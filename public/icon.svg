<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdf6e8"/>
      <stop offset="100%" stop-color="#f0e8da"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- V-A coordinate plane -->
  <line x1="96" y1="256" x2="416" y2="256" stroke="#d9cbb0" stroke-width="3"/>
  <line x1="256" y1="416" x2="256" y2="96" stroke="#d9cbb0" stroke-width="3"/>
  <!-- quadrant tints -->
  <rect x="256" y="96" width="160" height="160" fill="#d4783b" opacity="0.12"/>
  <rect x="96" y="96" width="160" height="160" fill="#c0563d" opacity="0.10"/>
  <rect x="96" y="256" width="160" height="160" fill="#8b7a5e" opacity="0.08"/>
  <rect x="256" y="256" width="160" height="160" fill="#d4783b" opacity="0.06"/>
  <!-- example point -->
  <circle cx="340" cy="300" r="22" fill="#d4783b" stroke="#fff" stroke-width="6"/>
  <!-- wordmark -->
  <text x="256" y="470" text-anchor="middle" font-family="Georgia, 'Noto Serif SC', serif" font-size="44" fill="#2c2416" font-style="italic">Momentune</text>
</svg>
